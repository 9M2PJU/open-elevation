version: "3.8"

services:
    server:
        restart: always
        build:
            context: .
            dockerfile: ./docker/Dockerfile
        volumes:
            - "./data:/code/data"
            - "./certs:/code/certs"
        environment:
            - PYTHONUNBUFFERED=1
            - OPEN_ELEVATION_AUTO_DOWNLOAD_DATA=true
        command: stdbuf -i0 -o0 -e0 python3 server.py
        ports:
            - 14599:8080
